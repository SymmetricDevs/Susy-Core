name: Publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: Mod version
        required: true
        type: string
      release-type:
        description: Release type
        type: choice
        default: beta
        options:
          - release
          - beta
          - alpha
      publish-cf:
        description: Publish to CF
        required: true
        type: boolean
        default: true
      publish-mr:
        description: Publish to MR
        required: true
        type: boolean
        default: true
      publish-gh:
        description: Publish to Github
        required: true
        type: boolean
        default: true
      publish-maven:
        description: Publish to Maven
        required: true
        type: boolean
        default: false
      overwrite:
        description: Overwrite existing tag
        default: false
        required: true
        type: boolean
      deploy-debug:
        description: Deploy debug
        default: false
        type: boolean

run-name: Publish ${{ github.event_name == 'push' && github.ref_name || inputs.version }}

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'push' && github.ref_name || inputs.version }}
  cancel-in-progress: true

jobs:
  publish:
    name: Build and publish ${{ github.event_name == 'push' && github.ref_name || inputs.version }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    env:
      CHANGELOG_LOCATION: build/gh_changelog.md

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve metadata
        id: meta
        uses: actions/github-script@v7
        with:
          script: |
            const isPush = context.eventName === 'push';
            const raw = isPush ? context.ref.replace('refs/tags/', '') : '${{ inputs.version }}';
            const version = raw.startsWith('v') ? raw.slice(1) : raw;
            const tag = `v${version}`;
            const publishGh = isPush ? 'true' : '${{ inputs.publish-gh }}';
            const tasks = ['${{ inputs.publish-cf }}' === 'true' || isPush ? 'curseforge' : '',
                           '${{ inputs.publish-mr }}' === 'true' || isPush ? 'modrinth' : '',
                           '${{ inputs.publish-maven }}' === 'true' && !isPush ? 'publish' : '']
                          .filter(Boolean).join(' ');
            core.setOutput('version', version);
            core.setOutput('tag', tag);
            core.setOutput('publish-gh', publishGh);
            core.setOutput('publish-cf', isPush ? 'true' : '${{ inputs.publish-cf }}');
            core.setOutput('publish-mr', isPush ? 'true' : '${{ inputs.publish-mr }}');
            core.setOutput('publish-maven', isPush ? 'false' : '${{ inputs.publish-maven }}');
            core.setOutput('release-type', isPush ? 'release' : '${{ inputs.release-type }}');
            core.setOutput('deploy-debug', isPush ? 'false' : '${{ inputs.deploy-debug }}');
            core.setOutput('gradle-tasks', tasks);
            if (publishGh === 'true' && '${{ inputs.overwrite }}' !== 'true') {
              try { await github.rest.git.getRef({ owner: context.repo.owner, repo: context.repo.repo, ref: `tags/${tag}` });
                   core.setFailed(`Tag ${tag} already exists.`); }
              catch (e) { if (e.status !== 404) core.setFailed(e.message); }
            }

      - name: Generate changelog
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = '${{ env.CHANGELOG_LOCATION }}';
            const { data } = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: '${{ steps.meta.outputs.tag }}',
              target_commitish: context.sha,
            });
            fs.mkdirSync('build', { recursive: true });
            fs.writeFileSync(path, data.body);
            core.info(`Wrote changelog to ${path}`);

      - name: Setup Build
        uses: ./.github/actions/build_setup

      - name: Build and publish
        env:
          MOD_VERSION: ${{ steps.meta.outputs.version }}
          PUBLISH_TO_GITHUB: ${{ steps.meta.outputs.publish-gh }}
          PUBLISH_TO_CURSEFORGE: ${{ steps.meta.outputs.publish-cf }}
          PUBLISH_TO_MODRINTH: ${{ steps.meta.outputs.publish-mr }}
          PUBLISH_TO_MAVEN: ${{ steps.meta.outputs.publish-maven }}
          RELEASE_TYPE: ${{ steps.meta.outputs.release-type }}
          DEPLOYMENT_DEBUG: ${{ steps.meta.outputs.deploy-debug }}
          CHANGELOG_LOCATION: ${{ env.CHANGELOG_LOCATION }}
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
          MODRINTH_API_KEY: ${{ secrets.MODRINTH_API_KEY }}
          MAVEN_USER: ${{ secrets.MAVEN_USER }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
        run: gradle build ${{ steps.meta.outputs.gradle-tasks }} --warning-mode all --build-cache

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v5
        with:
          name: MyMod-${{ steps.meta.outputs.version }}
          path: build/libs/*.jar
          if-no-files-found: error

      - name: Publish to GitHub
        if: steps.meta.outputs.publish-gh == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: build/libs/*.jar
          body_path: ${{ env.CHANGELOG_LOCATION }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
